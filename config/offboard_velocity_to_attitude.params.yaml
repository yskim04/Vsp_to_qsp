offboard_velocity_to_attitude_node:
  ros__parameters:
    kp_vel_xy: 1.8
    ki_vel_xy: 0.4
    kd_vel_xy: 0.2
    kp_vel_z: 4.0
    ki_vel_z: 2.0
    kd_vel_z: 0.0
    hover_thrust: 0.5
    thr_min: 0.12
    thr_max: 1.0
    tilt_max_rad: 0.7854
    thr_xy_margin: 0.3
    lim_vel_horizontal: 12.0
    lim_vel_up: 3.0
    lim_vel_down: 1.5
    decouple_horizontal_vertical_acceleration: true
    publish_offboard_control_mode: true
    loop_rate_hz: 50.0
    setpoint_timeout_sec: 0.5
    trajectory_setpoint_topic: "/fmu/in/trajectory_setpoint"
    vehicle_local_position_topic: "/fmu/out/vehicle_local_position"
    vehicle_land_detected_topic: "/fmu/out/vehicle_land_detected"
    vehicle_attitude_setpoint_topic: "/fmu/in/vehicle_attitude_setpoint"
    offboard_control_mode_topic: "/fmu/in/offboard_control_mode"
